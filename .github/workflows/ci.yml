name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - next

jobs:
  commitlint:
    name: Commit Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install

      - name: Lint (oxlint)
        run: pnpm lint

      - name: Format check (oxfmt)
        run: pnpm fmt:check

      - name: Lint Rust (clippy)
        run: pnpm lint:rs

      - name: Format check Rust (rustfmt)
        run: pnpm fmt:rs:check

  test:
    name: Test
    needs: [commitlint, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install

      - name: Build native addon (debug)
        run: pnpm build:debug

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

  build:
    name: Build (${{ matrix.settings.target }})
    if: |
      github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/next')
    needs: [commitlint, lint, test]
    strategy:
      fail-fast: false
      matrix:
        settings:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.settings.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.settings.target }}

      - name: Install dependencies
        run: pnpm install

      - name: Build native addon
        run: pnpm napi build --platform --release --output-dir dist --target ${{ matrix.settings.target }}

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: dist/*.node
          if-no-files-found: error

      - name: Upload JS bindings
        if: matrix.settings.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: js-bindings
          path: |
            dist/index.js
            dist/index.d.ts
          if-no-files-found: error

  build-wasm:
    name: Build (wasm)
    if: |
      github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/next')
    needs: [commitlint, lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1-threads

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-wasip1-threads

      - name: Install dependencies
        run: pnpm install

      - name: Build WASM
        run: pnpm build:wasm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: dist-wasm/
          if-no-files-found: error

  publish:
    name: Publish
    if: |
      github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/next')
    needs: [build, build-wasm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bindings-*
          path: artifacts

      - name: Create npm platform dirs
        run: pnpm napi create-npm-dirs

      - name: Move native bindings
        run: pnpm napi artifacts --build-output-dir artifacts

      - name: Download JS bindings
        uses: actions/download-artifact@v4
        with:
          name: js-bindings
          path: dist

      - name: Generate ESM wrapper
        run: node scripts/gen-esm.mjs

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm
          path: dist-wasm

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.WEBEACH_NPM_PUBLISH_TOKEN }}

      - name: Release (version bump, changelog, git tag, GitHub Release)
        run: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.WEBEACH_GITHUB_RELEASE_TOKEN }}
          GH_TOKEN: ${{ secrets.WEBEACH_GITHUB_RELEASE_TOKEN }}
          NPM_TOKEN: ${{ secrets.WEBEACH_NPM_PUBLISH_TOKEN }}

      - name: Publish platform packages
        run: pnpm napi pre-publish --no-gh-release -t npm

      - name: Publish main package
        run: npm publish --access public
